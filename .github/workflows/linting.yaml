on:
  push:
  paths: "src/**"
pull_request:
  branches:
  - "*"

name: R-linting

jobs:
  Linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -y && sudo apt-get -y install clang-format cppcheck
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::styler

    - name: Linting R code
      shell: Rscript {0}
      run: styler::style_pkg()

    - name: Linting C code
    - run: clang-format -i -style=google src/aricode.cpp
    - run: cppcheck -i src/RcppExports.cpp --quiet --enable=warning --error-exitcode=1 .

