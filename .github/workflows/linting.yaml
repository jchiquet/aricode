name: R-linting

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system tools
        run: sudo apt-get update -y && sudo apt-get -y install clang-format cppcheck

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::styler

      - name: Lint R code
        run: Rscript -e 'styler::style_pkg()'

      - name: Lint C code (clang-format)
        run: clang-format -i -style=google src/aricode.cpp

      - name: Lint C code (cppcheck)
        run: cppcheck -i src/RcppExports.cpp --quiet --enable=warning --error-exitcode=1 .
